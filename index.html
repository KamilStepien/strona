<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miłego Dzionka!</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }
        #info {
            font-size: 20px;
            margin-bottom: 20px;
        }
        #message {
            display: none;
            font-size: 24px;
            margin-top: 20px;
        }
        #countdown {
            font-size: 20px;
            margin-top: 10px;
        }
        .emoji {
            font-size: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info">Kliknij mnie!</div>
    <div class="emoji" onclick="showMessage()">😊</div>
    <div id="message">Miłego dzionka, słodka wariatko! 💖</div>
    <div id="countdown"></div>

    <script>
        function showMessage() {
            document.getElementById("message").style.display = "block";
            document.getElementById("info").style.display = "none";
            startCountdown();
        }

        function startCountdown() {
            const countdownElement = document.getElementById("countdown");
            const targetTime = new Date("2025-03-26T16:30:00").getTime();

            function updateCountdown() {
                const now = new Date().getTime();
                const timeLeft = targetTime - now;
                
                if (timeLeft > 0) {
                    const hours = Math.floor((timeLeft / (1000 * 60 * 60)) % 24);
                    const minutes = Math.floor((timeLeft / (1000 * 60)) % 60);
                    const seconds = Math.floor((timeLeft / 1000) % 60);
                    countdownElement.innerHTML = `Do spotkania zostało: ${hours}g ${minutes}m ${seconds}s`;
                } else {
                    countdownElement.innerHTML = "Czas minął!";
                }
            }
            
            updateCountdown();
            setInterval(updateCountdown, 1000);
        }
    </script>
</body>
</html>
